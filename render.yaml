services:
  - type: web
    name: rustdesk-monitoring-mvp
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DASHBOARD_SUPERVISOR_USERNAME
        value: supervisor
      - key: DASHBOARD_SUPERVISOR_PASSWORD
        sync: false
      - key: DASHBOARD_COOKIE_SECURE
        value: "true"
      - key: RUST_LOG
        value: info
      - key: WEBHOOK_ENABLED
        value: "false"
      - key: WEBHOOK_HMAC_ENABLED
        value: "false"
